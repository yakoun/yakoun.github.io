name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          ADAPTER: static
          PUBLIC_SUPABASE_URL: https://aqcpfjoeczyuxvqodlth.supabase.co
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_dy1sShCprQXPTwcSdrvaxg_PJhYqAXd
          PUBLIC_CONTACT_EMAIL: contact@electrodev.fr
          PUBLIC_WHATSAPP_NUMBER: '33600000000'
          PUBLIC_SITE_URL: https://yakoun.github.io
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
